# Prometheus scrape config for the payment-analytics platform (Phase 11).
# Four monitoring concerns the platform cares about most:
#   - Kafka consumer lag   -> kafka-exporter + the pipeline apps' own /metrics
#   - API latency          -> the unified API's /metrics (job: services)
#   - ClickHouse queries   -> ClickHouse native Prometheus endpoint (:9363)
#   - Airflow health       -> Airflow StatsD -> statsd-exporter -> here
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: payment-analytics

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ["localhost:9090"] }]

  # ---- Kafka: broker health + consumer-group lag -------------------------
  - job_name: kafka
    static_configs: [{ targets: ["kafka-exporter:9308"] }]

  # ---- PostgreSQL: connections + query stats ----------------------------
  - job_name: postgres
    static_configs: [{ targets: ["postgres-exporter:9187"] }]

  # ---- ClickHouse: native Prometheus endpoint (config.d/prometheus.xml) --
  - job_name: clickhouse
    static_configs: [{ targets: ["clickhouse:9363"] }]

  # ---- Airflow: StatsD pushed to statsd-exporter, scraped here -----------
  #   Scheduler heartbeat, DAG parse time, task successes/failures,
  #   executor slots, pool starvation. Populated under the `airflow` profile.
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]
        labels: { component: orchestration }

  # ---- Streaming pipeline app metrics (`pipeline` profile) --------------
  #   consumer_lag, events_consumed/inserted/dlq_total, ch_insert_seconds
  - job_name: kafka-pipeline
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-consumer:9000", "kafka-producer:9000"]
        labels: { component: pipeline }

  # ---- Unified API /metrics (`apps` profile) ----------------------------
  #   api_request_duration_seconds (histogram), api_requests_total
  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { component: api }
