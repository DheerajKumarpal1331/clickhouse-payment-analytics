# statsd_exporter mapping for Airflow metrics (Phase 11).
# Airflow emits dotted StatsD names (e.g. "airflow.ti_failures",
# "airflow.dagrun.duration.success.<dag_id>"); these rules turn the variable
# segments into Prometheus labels so a single metric covers every dag/task.
# Order matters — first match wins; the catch-all keeps everything else.
mappings:
  # --- scheduler liveness -------------------------------------------------
  # Counter names carry the Prometheus `_total` suffix (statsd_exporter does
  # not add it automatically); the alert rules reference these exact names.
  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    match_metric_type: counter

  # --- DAG parsing / import health ---------------------------------------
  - match: "airflow.dag_processing.import_errors"
    name: "airflow_dag_processing_import_errors"
  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_processing_total_parse_time"

  # --- task instance outcomes (global) -----------------------------------
  - match: "airflow.ti_failures"
    name: "airflow_ti_failures_total"
    match_metric_type: counter
  - match: "airflow.ti_successes"
    name: "airflow_ti_successes_total"
    match_metric_type: counter

  # --- executor / pool capacity ------------------------------------------
  - match: "airflow.executor.open_slots"
    name: "airflow_executor_open_slots"
  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"
  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
  - match: "airflow.pool.starving_tasks.*"
    name: "airflow_pool_starving_tasks"
    labels:
      pool: "$1"
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"

  # --- per-DAG run duration & outcomes -----------------------------------
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success"
    labels:
      dag_id: "$1"
  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed"
    labels:
      dag_id: "$1"
  - match: "airflow.dagrun.schedule_delay.*"
    name: "airflow_dagrun_schedule_delay"
    labels:
      dag_id: "$1"

  # --- per-operator task duration ----------------------------------------
  - match: "airflow.dag.*.*.duration"
    name: "airflow_task_duration"
    labels:
      dag_id: "$1"
      task_id: "$2"

# Anything not matched above is still exported by statsd_exporter with its
# dotted name sanitized to underscores (its default pass-through behaviour),
# so no catch-all rule is required.
