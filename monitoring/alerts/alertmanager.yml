# Alertmanager routing (Phase 11) — dev defaults.
# In qa/prod, wire the receivers to Slack / PagerDuty / email via
# secrets-managed webhook URLs (see deployment/). Critical pages fast and
# repeats hourly; warnings batch and repeat every 4h.
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [ 'severity="critical"' ]
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default
    # dev: no-op sink. Replace with a real webhook in qa/prod.
  - name: critical
    # webhook_configs:
    #   - url: 'https://hooks.slack.com/services/REPLACE/ME'

# A firing critical mutes the matching warning so on-call sees one page,
# not two, for the same incident.
inhibit_rules:
  - source_matchers: [ 'severity="critical"' ]
    target_matchers: [ 'severity="warning"' ]
    equal: ['alertname']
