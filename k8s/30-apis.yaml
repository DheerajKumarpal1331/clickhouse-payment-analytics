# Unified Payment Analytics API — all three domains (fraud / merchant /
# analytics) in one image (api/main.py). A single Deployment + ClusterIP
# Service, fronted by an HPA: the fraud /score path is the latency-critical
# checkout hot path that must scale with traffic.
# Image built from docker/api and pushed to your registry.
apiVersion: v1
kind: Service
metadata: {name: api, namespace: payments, labels: {app: api}}
spec:
  selector: {app: api}
  ports: [{name: http, port: 8000, targetPort: 8000}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: api, namespace: payments}
spec:
  replicas: 3
  selector: {matchLabels: {app: api}}
  template:
    metadata: {labels: {app: api}}
    spec:
      containers:
        - name: api
          image: payment-analytics/api:latest
          ports: [{containerPort: 8000}]
          env:
            - {name: PG_DSN, valueFrom: {secretKeyRef: {name: platform-secrets, key: PG_DSN}}}
            - {name: CH_URL, valueFrom: {secretKeyRef: {name: platform-secrets, key: CH_URL}}}
            - {name: MLFLOW_TRACKING_URI, valueFrom: {configMapKeyRef: {name: platform-config, key: MLFLOW_TRACKING_URI}}}
          readinessProbe: {httpGet: {path: /health, port: 8000}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /health, port: 8000}, initialDelaySeconds: 15, periodSeconds: 20}
          resources: {requests: {cpu: "250m", memory: 512Mi}, limits: {cpu: "1", memory: 1Gi}}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: api, namespace: payments}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: api}
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}
