# TEMPLATE ONLY — copy to 02-secret.yaml, set real values, and DO NOT commit it.
# In production these come from a secrets manager (External Secrets Operator,
# Sealed Secrets, Vault), never a plain manifest. stringData lets you write
# plaintext; Kubernetes stores it base64-encoded.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: payments
type: Opaque
stringData:
  POSTGRES_USER: payments
  POSTGRES_PASSWORD: change-me-postgres
  CLICKHOUSE_USER: analytics
  CLICKHOUSE_PASSWORD: change-me-clickhouse
  # Convenience DSNs/URLs assembled from the parts above for apps that want one var.
  PG_DSN: postgresql://payments:change-me-postgres@postgres:5432/payments
  CH_URL: http://analytics:change-me-clickhouse@clickhouse:8123
  GRAFANA_ADMIN_PASSWORD: change-me-grafana
