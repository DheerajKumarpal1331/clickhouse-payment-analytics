# PostgreSQL OLTP. A StatefulSet for stable identity + a PVC per replica.
# In production this is typically a managed service (RDS / Cloud SQL) with read
# replicas; this manifest is for self-hosted / dev clusters.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: payments
  labels: {app: postgres}
spec:
  clusterIP: None          # headless — stable pod DNS for the StatefulSet
  selector: {app: postgres}
  ports:
    - {name: pg, port: 5432, targetPort: 5432}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: payments
spec:
  serviceName: postgres
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{containerPort: 5432}]
          env:
            - {name: POSTGRES_DB, valueFrom: {configMapKeyRef: {name: platform-config, key: POSTGRES_DB}}}
            - {name: POSTGRES_USER, valueFrom: {secretKeyRef: {name: platform-secrets, key: POSTGRES_USER}}}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: platform-secrets, key: POSTGRES_PASSWORD}}}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "payments", "-d", "payments"]}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: {command: ["pg_isready", "-U", "payments", "-d", "payments"]}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: {cpu: "250m", memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: 10Gi}}
