# Monitoring — MINIMAL reference (Prometheus + Grafana). For production prefer the
# kube-prometheus-stack (Prometheus Operator) which adds ServiceMonitors, Thanos,
# and Alertmanager HA. Here Prometheus scrapes the in-cluster Service DNS names;
# the full rules/dashboards live in monitoring/ and are mounted in production.
apiVersion: v1
kind: ConfigMap
metadata: {name: prometheus-config, namespace: payments}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: clickhouse
        static_configs: [{targets: ["clickhouse:9363"]}]
      - job_name: services
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]
      - job_name: airflow
        static_configs: [{targets: ["statsd-exporter:9102"]}]
---
apiVersion: v1
kind: Service
metadata: {name: prometheus, namespace: payments, labels: {app: prometheus}}
spec:
  selector: {app: prometheus}
  ports: [{name: http, port: 9090, targetPort: 9090}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: prometheus, namespace: payments}
spec:
  replicas: 1
  selector: {matchLabels: {app: prometheus}}
  template:
    metadata: {labels: {app: prometheus}}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{containerPort: 9090}]
          volumeMounts: [{name: config, mountPath: /etc/prometheus}]
          resources: {requests: {cpu: "100m", memory: 256Mi}, limits: {cpu: "500m", memory: 512Mi}}
      volumes:
        - {name: config, configMap: {name: prometheus-config}}
---
apiVersion: v1
kind: Service
metadata: {name: grafana, namespace: payments, labels: {app: grafana}}
spec:
  selector: {app: grafana}
  ports: [{name: http, port: 3000, targetPort: 3000}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: grafana, namespace: payments}
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports: [{containerPort: 3000}]
          env:
            - {name: GF_SECURITY_ADMIN_PASSWORD, valueFrom: {secretKeyRef: {name: platform-secrets, key: GRAFANA_ADMIN_PASSWORD}}}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
          readinessProbe: {httpGet: {path: /api/health, port: 3000}, initialDelaySeconds: 15, periodSeconds: 15}
          resources: {requests: {cpu: "100m", memory: 256Mi}, limits: {cpu: "500m", memory: 512Mi}}
