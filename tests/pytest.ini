[pytest]
# Run from the repo root: `pytest -c tests/pytest.ini`
# Unit tests run anywhere (no infra). Integration/load are opt-in via markers
# and environment gating (see tests/conftest.py).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    unit: fast, no external services (default; runs everywhere)
    integration: needs the live Docker stack (Postgres/Kafka/ClickHouse); set RUN_INTEGRATION=1
    load: throughput / concurrency benchmarks (run explicitly, not in CI gate)
