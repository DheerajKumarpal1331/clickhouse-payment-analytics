global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: payment-analytics

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ["localhost:9090"] }]

  # Docker host + container resource metrics (CPU / mem / disk / network)
  - job_name: node-exporter
    static_configs: [{ targets: ["node-exporter:9100"] }]
  - job_name: cadvisor
    static_configs: [{ targets: ["cadvisor:8080"] }]

  # Kafka broker health + consumer lag
  - job_name: kafka
    static_configs: [{ targets: ["kafka-exporter:9308"] }]

  # PostgreSQL connections + query stats
  - job_name: postgres
    static_configs: [{ targets: ["postgres-exporter:9187"] }]

  # ClickHouse native Prometheus endpoint (enabled via config.d/prometheus.xml)
  - job_name: clickhouse
    static_configs: [{ targets: ["clickhouse:9363"] }]

  # Application /metrics — populated when the `pipeline` / `apps` profiles run.
  - job_name: kafka-pipeline
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-consumer:9000", "kafka-producer:9000"]
        labels: { component: pipeline }
  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets: ["fraud-api:8000", "merchant-api:8000", "analytics-api:8000"]
        labels: { component: api }
