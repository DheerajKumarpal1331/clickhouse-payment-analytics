{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: {{- include "pa.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: clickhouse
        static_configs: [{targets: ["clickhouse:9363"]}]
      - job_name: services
        metrics_path: /metrics
        static_configs:
          - targets: ["fraud-api:8000", "merchant-api:8000", "analytics-api:8000"]
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {{- include "pa.labels" . | nindent 4 }}
spec:
  selector: {app: prometheus}
  ports: [{name: http, port: 9090, targetPort: 9090}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: {{- include "pa.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector: {matchLabels: {app: prometheus}}
  template:
    metadata: {labels: {app: prometheus}}
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheusImage }}
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{containerPort: 9090}]
          volumeMounts: [{name: config, mountPath: /etc/prometheus}]
      volumes:
        - {name: config, configMap: {name: prometheus-config}}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {{- include "pa.labels" . | nindent 4 }}
spec:
  selector: {app: grafana}
  ports: [{name: http, port: 3000, targetPort: 3000}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: {{- include "pa.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafanaImage }}
          ports: [{containerPort: 3000}]
          env:
            - {name: GF_SECURITY_ADMIN_PASSWORD, valueFrom: {secretKeyRef: {name: {{ include "pa.secretName" . }}, key: GRAFANA_ADMIN_PASSWORD}}}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
          readinessProbe: {httpGet: {path: /api/health, port: 3000}, initialDelaySeconds: 15, periodSeconds: 15}
{{- end }}
