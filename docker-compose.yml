# ============================================================
# Payment Platform — full stack.
#   docker compose up -d            # infra + monitoring + dev tools (runnable now)
#   docker compose --profile pipeline up -d   # + Kafka producers/consumers (Phase 4)
#   docker compose --profile apps up -d       # + FastAPI services + dashboard
#   docker compose --profile ml up -d         # + feature store + fraud train/serve
#   docker compose --profile airflow up -d    # + Airflow (web/scheduler/worker/triggerer)
#
# Default (no profile) services use official images or build now and come up
# healthy on a fresh checkout. Profile services are wired up but depend on code
# delivered in later phases.
# ============================================================

x-restart: &restart unless-stopped

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3}
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-CeleryExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # custom operators/sensors live at the project root -> importable from DAGs
    PYTHONPATH: /opt/airflow
    # connector libs for the stock image (DAGs use stdlib urllib + psycopg2,
    # but pin these so a swap to clickhouse-connect needs no rebuild)
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # DAGs connect out to the platform's stores (Airflow Variable can override per-env)
    CH_URL: http://${CLICKHOUSE_USER:-analytics}:${CLICKHOUSE_PASSWORD:-analytics_secret}@clickhouse:8123
    PG_DSN: postgresql://${POSTGRES_USER:-payments}:${POSTGRES_PASSWORD:-payments_secret}@postgres:5432/${POSTGRES_DB:-payments}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/operators:/opt/airflow/operators
    - ./airflow/sensors:/opt/airflow/sensors
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  depends_on:
    postgres: {condition: service_healthy}
    redis: {condition: service_healthy}
  networks: [payments-net]
  profiles: [airflow]

services:
  # ======================= CORE INFRASTRUCTURE =======================
  postgres:
    image: postgres:16-alpine
    container_name: payments-postgres
    restart: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_EXTRA_DBS: ${POSTGRES_EXTRA_DBS}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro   # IaC: runs on first init
      - ./postgres:/project/postgres:ro                          # Phase-2 ddl/indexes/procedures/seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [payments-net]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: payments-clickhouse
    restart: *restart
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d:ro  # IaC: db/fact/dim/MV bootstrap
      - ./docker/clickhouse/config:/etc/clickhouse-server/config.d:ro
      - ./clickhouse:/warehouse:ro                                # Phase-5 warehouse DDL (auto-applied on first init)
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    healthcheck:
      test: ["CMD-SHELL", "wget -nv -t1 -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [payments-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: payments-zookeeper
    restart: *restart
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["${ZOOKEEPER_PORT:-2181}:2181"]
    volumes:
      - zkdata:/var/lib/zookeeper/data
    healthcheck:
      # Port-open check via bash /dev/tcp — no nc / 4lw-command dependency.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks: [payments-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: payments-kafka
    restart: *restart
    depends_on:
      zookeeper: {condition: service_healthy}
    ports: ["${KAFKA_EXTERNAL_PORT:-9092}:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks: [payments-net]

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: payments-kafka-init
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-6}
      KAFKA_TOPIC_REPLICATION: ${KAFKA_TOPIC_REPLICATION:-1}
      KAFKA_RETENTION_MS: ${KAFKA_RETENTION_MS:-604800000}
    volumes:
      - ./docker/kafka:/scripts:ro
    command: ["bash", "/scripts/create-topics.sh"]
    restart: "no"
    networks: [payments-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: payments-kafka-ui
    restart: *restart
    depends_on:
      kafka: {condition: service_healthy}
    ports: ["${KAFKA_UI_PORT:-8080}:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: payments
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks: [payments-net]

  # ============================ MLflow ===============================
  mlflow:
    build: {context: ./docker/mlflow}
    container_name: payments-mlflow
    restart: *restart
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["${MLFLOW_PORT:-5000}:5000"]
    environment:
      MLFLOW_BACKEND_URI: ${MLFLOW_BACKEND_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
    volumes:
      - mlflowdata:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [payments-net]

  # ========================== MONITORING =============================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: payments-prometheus
    restart: *restart
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    networks: [payments-net]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: payments-alertmanager
    restart: *restart
    ports: ["${ALERTMANAGER_PORT:-9093}:9093"]
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [payments-net]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: payments-grafana
    restart: *restart
    depends_on: [prometheus]
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    networks: [payments-net]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: payments-node-exporter
    restart: *restart
    ports: ["${NODE_EXPORTER_PORT:-9100}:9100"]
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks: [payments-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: payments-cadvisor
    restart: *restart
    ports: ["${CADVISOR_PORT:-8085}:8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks: [payments-net]

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: payments-kafka-exporter
    restart: *restart
    depends_on:
      kafka: {condition: service_healthy}
    command: ["--kafka.server=kafka:29092"]
    ports: ["9308:9308"]
    networks: [payments-net]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: payments-postgres-exporter
    restart: *restart
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports: ["9187:9187"]
    networks: [payments-net]

  # ======================= DEVELOPMENT UTILITIES =====================
  pgadmin:
    image: dpage/pgadmin4:8.9
    container_name: payments-pgadmin
    restart: *restart
    depends_on: [postgres]
    ports: ["${PGADMIN_PORT:-5050}:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@payments.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    networks: [payments-net]

  clickhouse-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    container_name: payments-clickhouse-ui
    restart: *restart
    depends_on: [clickhouse]
    ports: ["${CLICKHOUSE_UI_PORT:-5521}:5521"]
    environment:
      VITE_CLICKHOUSE_URL: http://localhost:${CLICKHOUSE_HTTP_PORT:-8123}
      VITE_CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      VITE_CLICKHOUSE_PASS: ${CLICKHOUSE_PASSWORD}
    networks: [payments-net]

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: payments-jupyter
    restart: *restart
    ports: ["${JUPYTER_PORT:-8888}:8888"]
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-payments}
    volumes:
      - ./notebooks:/home/jovyan/work
    networks: [payments-net]

  # ===================== PIPELINE (profile=pipeline) =================
  # Phase 4 — Kafka producers/consumers. Code lands in ./kafka.
  kafka-producer:
    build: {context: ., dockerfile: docker/kafka/Dockerfile}
    container_name: payments-kafka-producer
    restart: *restart
    profiles: [pipeline]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["python", "-m", "producers.run_producer", "--all"]
    networks: [payments-net]

  kafka-consumer:
    build: {context: ., dockerfile: docker/kafka/Dockerfile}
    container_name: payments-kafka-consumer
    restart: *restart
    profiles: [pipeline]
    depends_on:
      kafka: {condition: service_healthy}
      clickhouse: {condition: service_healthy}
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      CH_DB: ${CLICKHOUSE_DB}
    command: ["python", "-m", "consumers.run_consumer", "--all"]
    networks: [payments-net]

  # ===================== APPLICATIONS (profile=apps) =================
  merchant-api:
    build: {context: ., dockerfile: docker/api/Dockerfile}
    container_name: payments-merchant-api
    restart: *restart
    profiles: [apps]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      SERVICE: merchant_service
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports: ["${MERCHANT_API_PORT:-8001}:8000"]
    networks: [payments-net]

  analytics-api:
    build: {context: ., dockerfile: docker/api/Dockerfile}
    container_name: payments-analytics-api
    restart: *restart
    profiles: [apps]
    depends_on:
      clickhouse: {condition: service_healthy}
    environment:
      SERVICE: analytics_service
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
    ports: ["${ANALYTICS_API_PORT:-8002}:8000"]
    networks: [payments-net]

  fraud-api:
    build: {context: ., dockerfile: docker/api/Dockerfile}
    container_name: payments-fraud-api
    restart: *restart
    profiles: [apps]
    depends_on:
      clickhouse: {condition: service_healthy}
      mlflow: {condition: service_healthy}
    environment:
      SERVICE: fraud_service
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports: ["${FRAUD_API_PORT:-8003}:8000"]
    networks: [payments-net]

  plotly-dashboard:
    build: {context: ., dockerfile: docker/dashboard/Dockerfile}
    container_name: payments-dashboard
    restart: *restart
    profiles: [apps]
    depends_on: [analytics-api]
    environment:
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      ANALYTICS_API: http://analytics-api:8000
    ports: ["${DASHBOARD_PORT:-8050}:8050"]
    networks: [payments-net]

  # ========================= ML (profile=ml) =========================
  feature-store:
    build: {context: ., dockerfile: docker/feature-store/Dockerfile}
    container_name: payments-feature-store
    restart: *restart
    profiles: [ml]
    depends_on:
      clickhouse: {condition: service_healthy}
    environment:
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
    networks: [payments-net]

  fraud-training:
    build: {context: ., dockerfile: docker/ml/Dockerfile.train}
    container_name: payments-fraud-training
    profiles: [ml]
    depends_on:
      clickhouse: {condition: service_healthy}
      mlflow: {condition: service_healthy}
    environment:
      CH_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      MLFLOW_TRACKING_URI: http://mlflow:5000
    restart: "no"
    networks: [payments-net]

  fraud-serving:
    build: {context: ., dockerfile: docker/ml/Dockerfile.serve}
    container_name: payments-fraud-serving
    restart: *restart
    profiles: [ml]
    depends_on:
      mlflow: {condition: service_healthy}
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    networks: [payments-net]

  # ====================== AIRFLOW (profile=airflow) ==================
  redis:
    image: redis:7-alpine
    container_name: payments-redis
    restart: *restart
    profiles: [airflow]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [payments-net]

  airflow-init:
    <<: *airflow-common
    container_name: payments-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && airflow users create --username "$${_AIRFLOW_WWW_USER_USERNAME}" --password "$${_AIRFLOW_WWW_USER_PASSWORD}" --firstname admin --lastname admin --role Admin --email admin@payments.local || true
    environment:
      <<: *airflow-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: payments-airflow-web
    command: webserver
    ports: ["${AIRFLOW_WEB_PORT:-8082}:8080"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}

  airflow-scheduler:
    <<: *airflow-common
    container_name: payments-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  airflow-worker:
    <<: *airflow-common
    container_name: payments-airflow-worker
    command: celery worker
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  airflow-triggerer:
    <<: *airflow-common
    container_name: payments-airflow-triggerer
    command: triggerer
    depends_on:
      airflow-init: {condition: service_completed_successfully}

volumes:
  pgdata:
  chdata:
  kafkadata:
  zkdata:
  mlflowdata:
  promdata:
  grafanadata:
  pgadmindata:

networks:
  payments-net:
    name: payments-net
    driver: bridge
